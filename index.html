<!DOCTYPE html>
<html lang="en">
<head>
<meta property="og:image" content="weblogo.jpg" />
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YapX <3</title>
<link rel="icon" type="image/png" href="Logo.png">

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600&family=Poppins:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;}

body{
  min-height:100vh;
  background:#000;
  display:flex;
  align-items:center;
  justify-content:center;
  color:#fff;
  overflow:hidden;
}

/* BG SLIDER */
.bg-slider{
  position:fixed;
  inset:0;
  z-index:0;
}

.bg-slider img{
  position:absolute;
  width:100%;
  height:100%;
  object-fit:cover;
  opacity:0;
  transition:opacity 1.5s ease;
}

.bg-slider img.active{
  opacity:1;
}

/* Overlay */
.overlay{
  position:absolute;
  inset:0;
  background:rgba(0,0,0,.55);
  backdrop-filter:blur(7px);
  z-index:1;
}

/* Controls */
.bg-controls{
  position:fixed;
  top:50%;
  width:100%;
  display:flex;
  justify-content:space-between;
  padding:0 15px;
  z-index:2;
  transform:translateY(-50%);
}

.bg-controls button{
  width:40px;
  height:40px;
  border:none;
  border-radius:50%;
  background:rgba(255,255,255,.15);
  backdrop-filter:blur(10px);
  color:white;
  cursor:pointer;
}

/* Start Screen */
.start-screen{
  position:absolute;
  inset:0;
  display:flex;
  align-items:center;
  justify-content:center;
  background:rgba(0,0,0,.9);
  backdrop-filter:blur(25px);
  z-index:10;
}

.start-btn{
  padding:14px 36px;
  border-radius:40px;
  background:linear-gradient(135deg,#ff0000,#000);
  color:white;
  font-size:14px;
  letter-spacing:2px;
  cursor:pointer;
  box-shadow:0 0 30px red;
}

/* Card */
.container{z-index:3;}
.card{
  width:90%;
  max-width:320px;
  padding:25px;
  text-align:center;
  border-radius:20px;
  background:rgba(255,255,255,0.12);
  backdrop-filter:blur(18px);
  box-shadow:0 18px 45px rgba(0,0,0,.35);
}

.avatar{
  width:100px;height:100px;margin:auto;
  border-radius:50%;overflow:hidden;
}

.avatar img{width:100%;height:100%;object-fit:cover;}

h1{margin-top:10px;font-family:'Playfair Display';}
.quote{margin:10px 0;font-size:14px;font-style:italic;}
.tag{font-size:12px;opacity:.8;}

.socials{
  margin-top:15px;
  display:flex;
  justify-content:center;
  gap:12px;
}

.socials a{
  width:40px;height:40px;
  border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  background:rgba(255,255,255,.15);
  color:#fff;text-decoration:none;
}

/* Volume */
.volume{
  position:absolute;
  top:15px;
  left:15px;
  z-index:5;
}

/* Sparkles */
.sparkle{
  position:absolute;
  width:3px;height:3px;
  background:white;border-radius:50%;
  opacity:.7;
  animation:fall linear infinite;
}

@keyframes fall{
  to{transform:translateY(110vh);opacity:0;}
}

/* Toggle */
.sparkle-toggle{
  position:fixed;
  bottom:20px;
  right:20px;
  width:35px;height:35px;
  border:none;border-radius:50%;
  background:rgba(255,255,255,.15);
  color:white;
  z-index:6;
}
</style>
</head>

<body>

<!-- BG -->
<div class="bg-slider">
  <img src="bg1.jpg" class="active">
  <img src="bg2.jpg">
  <img src="bg3.jpg">
</div>

<div class="overlay"></div>

<!-- Controls -->
<div class="bg-controls">
  <button id="prevBg"><i class="fas fa-chevron-left"></i></button>
  <button id="nextBg"><i class="fas fa-chevron-right"></i></button>
</div>

<!-- Music -->
<audio id="bgMusic" loop>
  <source src="song.mp3">
</audio>

<!-- Start -->
<div class="start-screen" id="startScreen">
  <button class="start-btn" onclick="startMusic()">ENTER</button>
</div>

<!-- Volume -->
<div class="volume">
  <input type="range" min="0" max="100" value="40" id="volume">
</div>

<button class="sparkle-toggle" id="sparkleToggle">✦</button>

<!-- Card -->
<div class="container">
  <div class="card">
    <div class="avatar"><img src="pfp.gif"></div>
    <h1>YapX</h1>
    <p class="quote">We never truly value a moment until it becomes a memory.</p>
    <p class="tag">@yapx • YouTube</p>

    <div class="socials">
      <a href="https://youtube.com/@yapx"><i class="fab fa-youtube"></i></a>
      <a href="https://instagram.com/yapx7"><i class="fab fa-instagram"></i></a>
      <a href="#"><i class="fas fa-globe"></i></a>
    </div>
  </div>
</div>

<script>
const slides=document.querySelectorAll(".bg-slider img");
let index=0,auto;

function show(i){
  slides.forEach(s=>s.classList.remove("active"));
  slides[i].classList.add("active");
}

function next(){index=(index+1)%slides.length;show(index);}
function prev(){index=(index-1+slides.length)%slides.length;show(index);}

function startAuto(){auto=setInterval(next,4000);}
function stopAuto(){clearInterval(auto);}
startAuto();

document.getElementById("nextBg").onclick=()=>{next();stopAuto();startAuto();}
document.getElementById("prevBg").onclick=()=>{prev();stopAuto();startAuto();}

/* Swipe */
let startX=0;
document.addEventListener("touchstart",e=>startX=e.touches[0].clientX);
document.addEventListener("touchend",e=>{
  let endX=e.changedTouches[0].clientX;
  if(startX-endX>50)next();
  else if(endX-startX>50)prev();
  stopAuto();startAuto();
});

/* Music */
const music=document.getElementById("bgMusic");
const volume=document.getElementById("volume");
function startMusic(){
  music.play();
  document.getElementById("startScreen").style.display="none";
}
volume.oninput=()=>music.volume=volume.value/100;

/* Sparkles */
let sparkles=[],on=true;
for(let i=0;i<30;i++){
  let s=document.createElement("div");
  s.className="sparkle";
  s.style.left=Math.random()*100+"vw";
  s.style.animationDuration=5+Math.random()*5+"s";
  document.body.appendChild(s);
  sparkles.push(s);
}

document.getElementById("sparkleToggle").onclick=()=>{
  on=!on;
  sparkles.forEach(s=>s.style.display=on?"block":"none");
};
</script>

</body>
  </html>
